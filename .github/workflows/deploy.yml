name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx ng build --configuration production --base-href /Hardline/
      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/Hardline/browser/index.html dist/Hardline/browser/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/Hardline/browser
      - id: deployment
        uses: actions/deploy-pages@v4
