name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Inject API key
        run: sed -i "s|__OPENAI_API_KEY__|${{ secrets.OPENAI_API_KEY }}|g" src/environments/environment.prod.ts
      - run: npx ng build --configuration production --base-href /hardline/
      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/hardline/browser/index.html dist/hardline/browser/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/hardline/browser
      - id: deployment
        uses: actions/deploy-pages@v4
