<div class="macros">
  <div class="macros__item">
    <div class="macros__header">
      <span class="macros__label">Protein</span>
      <span class="macros__value">{{ protein() }}/{{ proteinGoal() }}g</span>
    </div>
    <div class="macros__track">
      <div class="macros__fill macros__fill--protein" [style.width.%]="proteinPct()"></div>
    </div>
  </div>
  <div class="macros__item">
    <div class="macros__header">
      <span class="macros__label">Carbs</span>
      <span class="macros__value">{{ carbs() }}/{{ carbsGoal() }}g</span>
    </div>
    <div class="macros__track">
      <div class="macros__fill macros__fill--carbs" [style.width.%]="carbsPct()"></div>
    </div>
  </div>
  <div class="macros__item">
    <div class="macros__header">
      <span class="macros__label">Fat</span>
      <span class="macros__value">{{ fat() }}/{{ fatGoal() }}g</span>
    </div>
    <div class="macros__track">
      <div class="macros__fill macros__fill--fat" [style.width.%]="fatPct()"></div>
    </div>
  </div>
</div>
