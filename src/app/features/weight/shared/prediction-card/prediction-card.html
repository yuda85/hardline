<div class="pred" [class.pred--empty]="!hasData()">
  <div class="pred__header">
    <span class="pred__label">Prediction</span>
    <span class="material-symbols-outlined pred__icon">auto_awesome</span>
  </div>

  @if (hasData()) {
    <div class="pred__body">
      <p class="pred__hint">Est. Target Reached</p>
      <span class="pred__date">{{ formattedDate() }}</span>
      @if (statusLabel(); as label) {
        <span class="pred__status" [class.pred__status--on-track]="status() === 'on_track'" [class.pred__status--behind]="status() === 'behind'" [class.pred__status--ahead]="status() === 'ahead'">{{ label }}</span>
      }
    </div>
  } @else {
    <div class="pred__body">
      <p class="pred__hint">Set a target weight and log meals to see predictions</p>
    </div>
  }
</div>
