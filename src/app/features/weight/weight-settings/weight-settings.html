<div class="wset">
  <!-- Header -->
  <header class="wset__header">
    <button class="wset__back" (click)="goBack()">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <h1 class="wset__title">Weight Settings</h1>
  </header>

  <!-- Editorial hero -->
  <div class="wset__hero">
    <span class="wset__ghost">DATA</span>
    <div class="wset__hero-text">
      <p class="wset__hero-label">Configure your metrics</p>
      <h2 class="wset__hero-title">Precision Control</h2>
    </div>
  </div>

  <form [formGroup]="form" class="wset__form">
    <!-- Goal Weight -->
    <section class="wset__card wset__card--primary">
      <div class="wset__card-header">
        <div>
          <h3 class="wset__card-title">GOAL WEIGHT</h3>
          <p class="wset__card-hint">Target mass for optimization.</p>
        </div>
        <span class="material-symbols-outlined wset__card-icon">monitor_weight</span>
      </div>
      <div class="wset__input-row">
        <div class="wset__field wset__field--grow">
          <label for="ws-target">Weight Value (KG)</label>
          <input
            id="ws-target"
            type="number"
            inputmode="decimal"
            step="0.1"
            formControlName="targetWeight"
            placeholder="185.0"
          />
        </div>
        <span class="wset__unit">KG</span>
      </div>
    </section>

    <!-- Morning Reminder -->
    <section class="wset__card wset__card--muted">
      <div class="wset__card-header">
        <div>
          <h3 class="wset__card-title">MORNING REMINDER</h3>
          <p class="wset__card-hint">Consistency breeds excellence.</p>
        </div>
        <span class="material-symbols-outlined wset__card-icon">alarm</span>
      </div>
      <div class="wset__reminder-row">
        <div class="wset__field">
          <label for="ws-reminder">Time Set</label>
          <input
            id="ws-reminder"
            type="time"
            formControlName="reminderTime"
          />
        </div>
        <div class="wset__enabled-badge">
          <span class="material-symbols-outlined wset__enabled-icon">notifications_active</span>
          <span class="wset__enabled-text">Enabled</span>
        </div>
      </div>
    </section>
  </form>

  <!-- Actions -->
  <div class="wset__actions">
    <button class="wset__cancel" (click)="goBack()">Cancel</button>
    <button class="wset__save" [disabled]="saving()" (click)="save()">
      @if (saving()) {
        Saving...
      } @else {
        Save Changes
      }
    </button>
  </div>

  <!-- Background decorative -->
  <div class="wset__bg-glow wset__bg-glow--primary"></div>
  <div class="wset__bg-glow wset__bg-glow--tertiary"></div>
</div>
