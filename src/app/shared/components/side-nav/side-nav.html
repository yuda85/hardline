<aside class="side-nav" [class.side-nav--collapsed]="collapsed()">
  <div class="side-nav__brand">
    <img class="side-nav__brand-icon" src="icon.png" alt="Hardline" />
    @if (!collapsed()) {
      <span class="side-nav__brand-text">Hardline</span>
    }
  </div>

  <nav class="side-nav__items">
    @for (item of items(); track item.route) {
      <a
        class="side-nav__item"
        [routerLink]="item.route"
        routerLinkActive="side-nav__item--active"
      >
        <span class="material-symbols-outlined side-nav__icon">{{ item.icon }}</span>
        @if (!collapsed()) {
          <span class="side-nav__label">{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <button class="side-nav__item side-nav__logout" (click)="logoutClicked.emit()">
    <span class="material-symbols-outlined side-nav__icon">logout</span>
    @if (!collapsed()) {
      <span class="side-nav__label">Log out</span>
    }
  </button>
</aside>
